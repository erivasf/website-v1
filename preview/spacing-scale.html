<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background: var(--cream-100); }
  .wrap { padding: 30px 36px; display: flex; flex-direction: column; gap: 14px; font-family: var(--font-sans); }
  .row { display: flex; align-items: center; gap: 18px; }
  .box { background: var(--ink-1000); border-radius: 2px; height: 18px; }
  .label { width: 84px; font-size: 11px; color: var(--ink-500); font-family: var(--font-mono); flex-shrink: 0; }
  .px { font-size: 11px; color: var(--ink-300); font-family: var(--font-mono); }
</style>
</head><body>
<div class="wrap">
  <div class="row"><div class="label">--space-2</div><div class="box" style="width:8px"></div><div class="px">8</div></div>
  <div class="row"><div class="label">--space-4</div><div class="box" style="width:16px"></div><div class="px">16</div></div>
  <div class="row"><div class="label">--space-5</div><div class="box" style="width:24px"></div><div class="px">24</div></div>
  <div class="row"><div class="label">--space-6</div><div class="box" style="width:32px"></div><div class="px">32</div></div>
  <div class="row"><div class="label">--space-7</div><div class="box" style="width:48px"></div><div class="px">48</div></div>
  <div class="row"><div class="label">--space-8</div><div class="box" style="width:64px"></div><div class="px">64</div></div>
  <div class="row"><div class="label">--space-9</div><div class="box" style="width:96px"></div><div class="px">96</div></div>
  <div class="row"><div class="label">--space-10</div><div class="box" style="width:128px"></div><div class="px">128 · section rhythm</div></div>
</div>
</body></html>
