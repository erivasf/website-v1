<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background: var(--cream-100); }
  .wrap { padding: 28px 32px; display: grid; grid-template-columns: 1.2fr 1fr 1fr; gap: 16px; align-items: stretch; }
  .card { border-radius: 16px; overflow: hidden; border: 1px solid var(--cream-300); background: var(--cream-50); }
  .hero { position: relative; height: 160px; background: #D4F233; display: flex; align-items: flex-end; padding: 16px; }
  .hero .mark { font-family: var(--font-display); font-size: 88px; line-height: 0.85; color: #0D0D0D; letter-spacing: -0.03em; }
  .chip { height: 82px; }
  .lime-light { background: #E9F98A; }
  .meta { padding: 12px 14px 14px; font-family: var(--font-sans); font-size: 11px; }
  .name { color: var(--ink-1000); font-weight: 600; }
  .hex  { color: var(--ink-500); font-family: var(--font-mono); font-size: 10.5px; margin-top: 2px; }
  .token { color: var(--ink-300); font-size: 10px; margin-top: 1px; }
  .note { padding: 10px 14px; font-family: var(--font-sans); font-size: 10.5px; color: var(--ink-500); border-top: 1px dashed var(--cream-300); }
</style>
</head><body>
<div class="wrap">
  <div class="card">
    <div class="hero"><div class="mark">.</div></div>
    <div class="meta"><div class="name">Accent · Lime</div><div class="hex">#D4F233</div><div class="token">--accent-lime</div></div>
    <div class="note">Max 2–3 uses per page. Used like punctuation.</div>
  </div>
  <div class="card">
    <div class="chip" style="background:#9ABF00"></div>
    <div class="meta"><div class="name">Lime · deeper</div><div class="hex">#9ABF00</div><div class="token">--accent-lime-ink</div></div>
  </div>
  <div class="card">
    <div class="chip" style="background:#D99A4E"></div>
    <div class="meta"><div class="name">Amber capsule</div><div class="hex">#D99A4E</div><div class="token">--amber-capsule · imagery</div></div>
  </div>
</div>
</body></html>
