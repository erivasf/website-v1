<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background: var(--cream-100); }
  .wrap { padding: 24px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .sw { border-radius: 12px; overflow: hidden; border: 1px solid var(--cream-300); background: var(--cream-50); }
  .chip { height: 82px; }
  .meta { padding: 10px 12px 12px; font-family: var(--font-sans); font-size: 11px; }
  .name { color: var(--ink-1000); font-weight: 600; letter-spacing: -0.01em; }
  .hex  { color: var(--ink-500); font-family: var(--font-mono); font-size: 10.5px; margin-top: 2px; }
  .token { color: var(--ink-300); font-size: 10px; margin-top: 1px; }
</style>
</head><body>
<div class="wrap">
  <div class="sw"><div class="chip" style="background:#0D0D0D"></div><div class="meta"><div class="name">Ink 1000 · primary</div><div class="hex">#0D0D0D</div><div class="token">--ink-1000</div></div></div>
  <div class="sw"><div class="chip" style="background:#1A1A1A"></div><div class="meta"><div class="name">Ink 900</div><div class="hex">#1A1A1A</div><div class="token">--ink-900</div></div></div>
  <div class="sw"><div class="chip" style="background:#3D3D3D"></div><div class="meta"><div class="name">Ink 700</div><div class="hex">#3D3D3D</div><div class="token">--ink-700</div></div></div>
  <div class="sw"><div class="chip" style="background:#6B6B6B"></div><div class="meta"><div class="name">Ink 500 · muted</div><div class="hex">#6B6B6B</div><div class="token">--ink-500</div></div></div>
  <div class="sw"><div class="chip" style="background:#A3A09A"></div><div class="meta"><div class="name">Ink 300 · quiet</div><div class="hex">#A3A09A</div><div class="token">--ink-300</div></div></div>
</div>
</body></html>
