<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background: var(--cream-100); }
  .nav { position: sticky; top: 0; display: flex; align-items: center; justify-content: space-between; padding: 14px 28px; background: rgba(245,243,239,0.82); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid var(--cream-300); }
  .logo img { height: 22px; display: block; }
  .links { display: flex; gap: 26px; font-family: var(--font-sans); font-size: 13.5px; color: var(--ink-700); }
  .links a { color: inherit; text-decoration: none; }
  .cta { background: var(--ink-1000); color: var(--cream-100); padding: 10px 20px; border-radius: 999px; font-family: var(--font-sans); font-size: 13px; font-weight: 500; }
  .pad { height: 20px; }
</style>
</head><body>
<div class="nav">
  <div class="logo"><img src="../assets/omme-logo-full.png" alt="omme"></div>
  <div class="links">
    <a>Protocolo</a><a>Cómo funciona</a><a>Precios</a><a>FAQ</a>
  </div>
  <div class="cta">Empieza tu evaluación  →</div>
</div>
<div class="pad"></div>
</body></html>
