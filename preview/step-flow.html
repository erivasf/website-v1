<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background: var(--cream-100); }
  .wrap { padding: 26px 36px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; font-family: var(--font-sans); }
  .step { position: relative; padding: 20px 18px; border-top: 1px solid var(--ink-1000); }
  .num { font-family: var(--font-display); font-size: 46px; line-height: 1; color: var(--ink-1000); letter-spacing: -0.03em; }
  .title { font-size: 15px; font-weight: 600; color: var(--ink-1000); margin-top: 18px; letter-spacing: -0.01em; }
  .desc { font-size: 12.5px; color: var(--ink-500); margin-top: 6px; line-height: 1.45; }
</style>
</head><body>
<div class="wrap">
  <div class="step"><div class="num">01</div><div class="title">Evaluación gratuita</div><div class="desc">Responde un cuestionario médico en 5 minutos.</div></div>
  <div class="step"><div class="num">02</div><div class="title">Protocolo personalizado</div><div class="desc">Un dermatólogo certificado lo diseña para ti.</div></div>
  <div class="step"><div class="num">03</div><div class="title">Seguimiento mensual</div><div class="desc">Ajustes, fotos y soporte — todo desde casa.</div></div>
</div>
</body></html>
