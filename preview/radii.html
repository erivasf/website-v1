<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background: var(--cream-100); }
  .wrap { padding: 28px 36px; display: grid; grid-template-columns: repeat(6, 1fr); gap: 16px; font-family: var(--font-sans); }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .shape { width: 72px; height: 46px; background: var(--cream-50); border: 1px solid var(--cream-300); }
  .tok { font-size: 10.5px; color: var(--ink-500); font-family: var(--font-mono); text-align: center; }
  .name { font-size: 11px; color: var(--ink-1000); font-weight: 600; text-align: center; }
</style>
</head><body>
<div class="wrap">
  <div class="cell"><div class="shape" style="border-radius:2px"></div><div class="name">XS</div><div class="tok">2 · rules</div></div>
  <div class="cell"><div class="shape" style="border-radius:6px"></div><div class="name">SM</div><div class="tok">6 · chips</div></div>
  <div class="cell"><div class="shape" style="border-radius:12px"></div><div class="name">MD</div><div class="tok">12 · inputs</div></div>
  <div class="cell"><div class="shape" style="border-radius:20px"></div><div class="name">LG</div><div class="tok">20 · cards</div></div>
  <div class="cell"><div class="shape" style="border-radius:28px"></div><div class="name">XL</div><div class="tok">28 · hero media</div></div>
  <div class="cell"><div class="shape" style="border-radius:999px"></div><div class="name">Pill</div><div class="tok">∞ · CTAs</div></div>
</div>
</body></html>
