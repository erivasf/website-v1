<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background: var(--cream-100); }
  .wrap { padding: 30px 36px; display: flex; flex-wrap: wrap; align-items: center; gap: 10px; font-family: var(--font-sans); }
  .b { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 999px; font-size: 11.5px; font-weight: 500; letter-spacing: 0.02em; }
  .b.neutral { background: var(--cream-200); color: var(--ink-1000); border: 1px solid var(--cream-300); }
  .b.outline { border: 1px solid var(--ink-1000); color: var(--ink-1000); }
  .b.dark { background: var(--ink-1000); color: var(--cream-100); }
  .b.lime { background: var(--accent-lime); color: var(--ink-1000); font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; font-size: 10px; padding: 5px 10px; }
  .dot { width: 6px; height: 6px; border-radius: 999px; background: currentColor; }
</style>
</head><body>
<div class="wrap">
  <span class="b neutral">Dermatólogo certificado</span>
  <span class="b outline">Seguimiento mensual</span>
  <span class="b dark">Envío incluido</span>
  <span class="b lime">Recomendado</span>
  <span class="b neutral"><span class="dot"></span> En protocolo</span>
</div>
</body></html>
