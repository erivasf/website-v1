<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background: var(--cream-100); }
  .wrap { padding: 32px 40px; }
  .fam { margin-bottom: 18px; }
  .fam:last-child { margin-bottom: 0; }
  .tag { font-family: var(--font-sans); font-size: 10.5px; color: var(--ink-300); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 6px; }
  .name-serif { font-family: var(--font-display); font-size: 48px; color: var(--ink-1000); letter-spacing: -0.03em; line-height: 1; }
  .name-sans  { font-family: var(--font-sans); font-size: 44px; color: var(--ink-1000); letter-spacing: -0.02em; line-height: 1; font-weight: 500; }
  .glyphs { font-family: inherit; font-size: 16px; color: var(--ink-500); margin-top: 6px; letter-spacing: 0; }
  .s { font-family: var(--font-display); }
  .n { font-family: var(--font-sans); }
</style>
</head><body>
<div class="wrap">
  <div class="fam">
    <div class="tag">Display · Instrument Serif</div>
    <div class="name-serif">Aa Bb <span style="font-style:italic">Cc Dd</span> Ee Ff 0123</div>
    <div class="glyphs s">— protocolo — folículo — evaluación —</div>
  </div>
  <div class="fam">
    <div class="tag">Body · DM Sans</div>
    <div class="name-sans">Aa Bb Cc Dd Ee Ff Gg 0123456789</div>
    <div class="glyphs n">regular · medium · semibold · bold</div>
  </div>
</div>
</body></html>
