<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background: var(--cream-100); }
  .wrap { padding: 24px 30px; display: grid; grid-template-columns: 1.1fr 1fr; gap: 18px; font-family: var(--font-sans); }
  .card { background: var(--cream-50); border: 1px solid var(--cream-300); border-radius: 20px; padding: 22px 24px; box-shadow: 0 2px 8px rgba(13,13,13,.05); }
  .card.featured { background: var(--ink-1000); color: var(--cream-100); border-color: var(--ink-1000); position: relative; }
  .tag { display: inline-block; font-size: 10.5px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-500); margin-bottom: 10px; }
  .card.featured .tag { color: var(--accent-lime); font-weight: 600; }
  .title { font-family: var(--font-display); font-size: 26px; letter-spacing: -0.03em; line-height: 1.05; margin: 0 0 4px; }
  .price { font-family: var(--font-display); font-size: 40px; letter-spacing: -0.03em; margin: 14px 0 2px; }
  .meta { font-size: 12px; color: var(--ink-500); }
  .card.featured .meta { color: #b8b4ab; }
  .badge { position: absolute; top: 16px; right: 16px; background: var(--accent-lime); color: var(--ink-1000); font-size: 10px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; padding: 5px 10px; border-radius: 999px; }
</style>
</head><body>
<div class="wrap">
  <div class="card">
    <div class="tag">Plan 6 meses</div>
    <div class="title">Protocolo inicial</div>
    <div class="price">$4,799</div>
    <div class="meta">pesos · con MSI · evaluación gratuita</div>
  </div>
  <div class="card featured">
    <div class="badge">Recomendado</div>
    <div class="tag">Plan 12 meses</div>
    <div class="title">Protocolo completo</div>
    <div class="price">$8,699</div>
    <div class="meta">Ahorras $889 · regular $9,588</div>
  </div>
</div>
</body></html>
