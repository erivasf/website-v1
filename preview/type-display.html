<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background: var(--cream-100); }
  .wrap { padding: 28px 36px; }
  .row { display: flex; align-items: baseline; gap: 24px; padding: 10px 0; border-bottom: 1px dashed var(--cream-300); }
  .row:last-child { border-bottom: 0; }
  .label { font-family: var(--font-sans); font-size: 10.5px; color: var(--ink-300); letter-spacing: 0.12em; text-transform: uppercase; width: 110px; flex-shrink: 0; }
  .sample { font-family: var(--font-display); color: var(--ink-1000); letter-spacing: -0.03em; line-height: 1.02; }
</style>
</head><body>
<div class="wrap">
  <div class="row"><div class="label">Display · 112</div><div class="sample" style="font-size:72px">Tu cabello</div></div>
  <div class="row"><div class="label">H1 · 80</div><div class="sample" style="font-size:56px">No es un shampoo.</div></div>
  <div class="row"><div class="label">H2 · 56</div><div class="sample" style="font-size:40px">Así funciona.</div></div>
  <div class="row"><div class="label">H3 · 40 italic</div><div class="sample" style="font-size:30px; font-style:italic">El folículo responde</div></div>
</div>
</body></html>
