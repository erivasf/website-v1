<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background: var(--cream-100); }
  .wrap { padding: 30px 36px; display: flex; flex-wrap: wrap; align-items: center; gap: 14px; font-family: var(--font-sans); }
  .btn { display: inline-flex; align-items: center; gap: 10px; font-size: 15px; font-weight: 500; border-radius: 999px; padding: 14px 26px; letter-spacing: -0.005em; border: 1px solid transparent; cursor: pointer; transition: all .25s cubic-bezier(.2,.7,.2,1); }
  .btn.primary { background: var(--ink-1000); color: var(--cream-100); }
  .btn.ghost { background: transparent; color: var(--ink-1000); border-color: var(--ink-1000); }
  .btn.lime { background: var(--accent-lime); color: var(--ink-1000); }
  .btn.sm { padding: 10px 18px; font-size: 13px; }
  .btn .arrow { font-family: var(--font-display); font-size: 17px; }
</style>
</head><body>
<div class="wrap">
  <button class="btn primary">Empieza tu evaluación gratuita <span class="arrow">→</span></button>
  <button class="btn ghost">Conoce el protocolo</button>
  <button class="btn lime">Ver planes <span class="arrow">→</span></button>
  <button class="btn primary sm">Empezar</button>
</div>
</body></html>
