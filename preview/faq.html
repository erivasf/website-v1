<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background: var(--cream-100); }
  .wrap { padding: 30px 36px; font-family: var(--font-sans); }
  details { border-top: 1px solid var(--cream-300); padding: 14px 0; }
  details:last-child { border-bottom: 1px solid var(--cream-300); }
  summary { list-style: none; cursor: pointer; display: flex; align-items: center; justify-content: space-between; font-size: 15px; font-weight: 500; color: var(--ink-1000); letter-spacing: -0.01em; }
  summary::-webkit-details-marker { display: none; }
  summary::after { content: "+"; font-family: var(--font-display); font-size: 26px; color: var(--ink-1000); line-height: 0.8; }
  details[open] summary::after { content: "–"; }
  .ans { margin-top: 10px; color: var(--ink-500); font-size: 13.5px; line-height: 1.55; }
</style>
</head><body>
<div class="wrap">
  <details open><summary>¿Cuánto tarda en verse resultados?</summary><div class="ans">Los primeros cambios son visibles alrededor del mes 3. Los resultados consistentes requieren mínimo 6 meses — así funciona el folículo.</div></details>
  <details><summary>¿Qué incluye el protocolo?</summary></details>
  <details><summary>¿Hay efectos secundarios?</summary></details>
</div>
</body></html>
