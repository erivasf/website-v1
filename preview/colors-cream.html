<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background: var(--cream-100); }
  .wrap { padding: 24px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .sw { border-radius: 12px; overflow: hidden; border: 1px solid var(--cream-300); background: var(--cream-50); }
  .chip { height: 82px; position: relative; }
  .chip::after { content: ""; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(255,255,255,0.35), transparent 35%); pointer-events: none; }
  .meta { padding: 10px 12px 12px; font-family: var(--font-sans); font-size: 11px; }
  .name { color: var(--ink-1000); font-weight: 600; letter-spacing: -0.01em; }
  .hex  { color: var(--ink-500); font-family: var(--font-mono); font-size: 10.5px; margin-top: 2px; }
  .token { color: var(--ink-300); font-size: 10px; margin-top: 1px; }
</style>
</head><body>
<div class="wrap">
  <div class="sw"><div class="chip" style="background:#FAFAFB"></div><div class="meta"><div class="name">Silver 50</div><div class="hex">#FAFAFB</div><div class="token">--cream-50</div></div></div>
  <div class="sw"><div class="chip" style="background:#F2F2F0"></div><div class="meta"><div class="name">Silver 100 · canvas</div><div class="hex">#F2F2F0</div><div class="token">--cream-100</div></div></div>
  <div class="sw"><div class="chip" style="background:#E8E9E6"></div><div class="meta"><div class="name">Silver 200</div><div class="hex">#E8E9E6</div><div class="token">--cream-200</div></div></div>
  <div class="sw"><div class="chip" style="background:#D8DAD6"></div><div class="meta"><div class="name">Silver 300 · border</div><div class="hex">#D8DAD6</div><div class="token">--cream-300</div></div></div>
  <div class="sw"><div class="chip" style="background:#BFC2BE"></div><div class="meta"><div class="name">Silver 400 · pewter</div><div class="hex">#BFC2BE</div><div class="token">--cream-400</div></div></div>
</div>
</body></html>
