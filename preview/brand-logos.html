<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background: var(--cream-100); }
  .wrap { padding: 32px 36px; display: grid; grid-template-columns: 1fr 1fr; gap: 28px; align-items: center; }
  .block { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 20px; background: var(--cream-50); border: 1px solid var(--cream-300); border-radius: 20px; }
  .block img { height: 42px; display: block; }
  .block.dark { background: var(--ink-1000); border-color: var(--ink-1000); }
  .block.dark img { filter: invert(1); }
  .lbl { font-family: var(--font-sans); font-size: 10.5px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-500); }
  .block.dark .lbl { color: #b8b4ab; }
</style>
</head><body>
<div class="wrap">
  <div class="block">
    <img src="../assets/omme-logo-full.png" alt="Omme wordmark">
    <div class="lbl">Wordmark · on cream</div>
  </div>
  <div class="block dark">
    <img src="../assets/omme-logo-iso.png" alt="Omme iso">
    <div class="lbl">Isotype · on ink</div>
  </div>
</div>
</body></html>
